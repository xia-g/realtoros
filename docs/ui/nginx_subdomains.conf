# Nginx Configuration — Multi-Subdomain Deployment
# Requirements: AP-1 Zero Hardcode, AP-3 Multi-Tenant Ready
# Variables from PlatformSettings: ${PRIMARY_DOMAIN}

# Global
upstream api_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

# Cache zones
proxy_cache_path /var/cache/nginx/realtor levels=1:2 keys_zone=realtor_cache:10m max_size=1g inactive=60m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name *.${PRIMARY_DOMAIN} ${PRIMARY_DOMAIN};
    return 301 https://$host$request_uri;
}

# ── API Subdomain ──
server {
    listen 443 ssl http2;
    server_name api.${PRIMARY_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/v1/ai/ {
        proxy_pass http://api_backend;
        proxy_read_timeout 120s;  # AI responses may be slow
    }

    location /api/v1/executive/ {
        proxy_pass http://api_backend;
        proxy_cache realtor_cache;
        proxy_cache_valid 200 30s;
    }

    location /api/v1/analytics/ {
        proxy_pass http://api_backend;
        proxy_cache realtor_cache;
        proxy_cache_valid 200 60s;
    }
}

# ── CRM Subdomain ──
server {
    listen 443 ssl http2;
    server_name crm.${PRIMARY_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;

    root /var/www/realtor/frontend/crm/out;
    index index.html;

    location /_next/static {
        alias /var/www/realtor/frontend/crm/out/_next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}

# ── Executive Subdomain ──
server {
    listen 443 ssl http2;
    server_name executive.${PRIMARY_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;

    root /var/www/realtor/frontend/executive/out;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}

# ── Analytics Subdomain ──
server {
    listen 443 ssl http2;
    server_name analytics.${PRIMARY_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;

    root /var/www/realtor/frontend/analytics/out;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}

# ── Admin Subdomain ──
server {
    listen 443 ssl http2;
    server_name admin.${PRIMARY_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;

    root /var/www/realtor/frontend/admin/out;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # Restrict admin access by IP or VPN
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
}

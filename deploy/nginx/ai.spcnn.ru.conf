# RealtorOS — Frontend (Next.js)
server {
    listen 80;
    server_name ai.spcnn.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.spcnn.ru;

    ssl_certificate /etc/letsencrypt/live/spcnn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spcnn.ru/privkey.pem;

    client_max_body_size 50M;

    location /_next/static {
        alias /home/xiag/real-estate-os/frontend/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
